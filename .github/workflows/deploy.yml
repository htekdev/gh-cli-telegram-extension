name: Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      instance_type:
        description: 'EC2 instance type'
        required: false
        default: 't3.medium'
        type: string

env:
  TF_VAR_gh_token: ${{ secrets.TF_VAR_GH_TOKEN }}
  TF_VAR_copilot_github_token: ${{ secrets.TF_VAR_COPILOT_GITHUB_TOKEN }}
  TF_VAR_telegram_bot_token: ${{ secrets.TF_VAR_TELEGRAM_BOT_TOKEN }}
  TF_VAR_exa_api_key: ${{ secrets.TF_VAR_EXA_API_KEY }}
  TF_VAR_perplexity_api_key: ${{ secrets.TF_VAR_PERPLEXITY_API_KEY }}
  TF_VAR_youtube_api_key: ${{ secrets.TF_VAR_YOUTUBE_API_KEY }}
  TF_VAR_zernio_api_key: ${{ secrets.TF_VAR_ZERNIO_API_KEY }}
  TF_VAR_instance_type: ${{ inputs.instance_type }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1

jobs:
  deploy:
    if: inputs.action == 'deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem
          chmod 600 $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem

      - name: Terraform Init
        working-directory: infra/aws
        run: terraform init

      - name: Destroy existing (if any)
        working-directory: infra/aws
        run: terraform destroy -auto-approve 2>&1 || echo "No existing infrastructure"

      - name: Terraform Apply
        working-directory: infra/aws
        run: |
          terraform apply -auto-approve
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV
          echo "INSTANCE_ID=$(terraform output -raw instance_id)" >> $GITHUB_ENV

      - name: Wait for bootstrap
        run: |
          echo "⏳ Waiting for bootstrap to complete..."
          echo "   Instance: ${{ env.INSTANCE_ID }}"
          echo "   IP: ${{ env.PUBLIC_IP }}"

          # Wait for SSH to become available
          for i in $(seq 1 30); do
            if ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=5 \
                -o ServerAliveInterval=5 \
                -o ServerAliveCountMax=2 \
                ubuntu@${{ env.PUBLIC_IP }} "echo ready" 2>/dev/null; then
              echo "✅ SSH available"
              break
            fi
            echo "   Attempt $i/30 - waiting for SSH..."
            sleep 10
          done

          # Poll deploy status until success or failure
          for i in $(seq 1 60); do
            STATUS=$(ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=10 \
                -o ServerAliveInterval=5 \
                -o ServerAliveCountMax=3 \
                ubuntu@${{ env.PUBLIC_IP }} \
                "cat ~/.deploy-status 2>/dev/null || echo STILL_RUNNING" 2>/dev/null || echo "SSH_FAILED")

            echo "   Check $i/60: $STATUS"

            if echo "$STATUS" | grep -q '"status":"success"'; then
              echo "✅ Bootstrap completed successfully!"
              break
            fi

            if echo "$STATUS" | grep -q '"status":"failure"'; then
              echo "❌ Bootstrap failed!"
              ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
                  -o StrictHostKeyChecking=no \
                  ubuntu@${{ env.PUBLIC_IP }} \
                  "tail -30 /var/log/bootstrap.log" 2>/dev/null || true
              exit 1
            fi

            sleep 15
          done

      - name: Verify Copilot running
        run: |
          echo "🔍 Verifying Copilot CLI is running in sandbox..."
          ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.PUBLIC_IP }} \
              'ps aux | grep copilot | grep -v grep | head -3'

      - name: Verify Telegram polling
        run: |
          echo "🔍 Checking Telegram polling..."
          sleep 30
          TELEGRAM_COUNT=$(ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.PUBLIC_IP }} \
              'export PATH=$HOME/.local/bin:$PATH && openshell logs $(cat ~/.sandbox-name) --since 2m 2>/dev/null | grep "api.telegram" | wc -l' 2>/dev/null || echo "0")

          echo "   Telegram requests in last 2 min: $TELEGRAM_COUNT"

          if [ "$TELEGRAM_COUNT" -gt "0" ]; then
            echo "✅ Telegram bridge is polling!"
          else
            echo "⚠️ No Telegram traffic yet — extension may still be loading"
          fi

      - name: Deploy summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  ✅ DEPLOY COMPLETE                                        ║"
          echo "║                                                            ║"
          echo "║  Instance: ${{ env.INSTANCE_ID }}                          ║"
          echo "║  IP: ${{ env.PUBLIC_IP }}                                  ║"
          echo "║                                                            ║"
          echo "║  SSH:                                                      ║"
          echo "║    ssh -i key.pem ubuntu@${{ env.PUBLIC_IP }}              ║"
          echo "║                                                            ║"
          echo "║  Sandbox:                                                  ║"
          echo "║    openshell sandbox connect \$(cat ~/.sandbox-name)       ║"
          echo "║                                                            ║"
          echo "║  Copilot CLI is running with --yolo --autopilot            ║"
          echo "║  Telegram bridge is active                                 ║"
          echo "╚══════════════════════════════════════════════════════════════╝"

      - name: Save Terraform state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: |
            infra/aws/terraform.tfstate
            infra/aws/terraform.tfstate.backup
          retention-days: 30

  destroy:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem
          chmod 600 $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem

      - name: Download Terraform state
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: infra/aws/
        continue-on-error: true

      - name: Terraform Init
        working-directory: infra/aws
        run: terraform init

      - name: Terraform Destroy
        working-directory: infra/aws
        run: |
          terraform destroy -auto-approve
          echo "✅ Infrastructure destroyed"

      - name: Cleanup SSH key
        if: always()
        run: rm -f $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem
