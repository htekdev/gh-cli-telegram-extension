name: Deploy to AWS

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      environment:
        description: 'Environment (auto-detected for push/PR triggers)'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

jobs:
  deploy:
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-${{ github.event_name == 'pull_request' && 'dev' || inputs.environment || 'prod' }}
      cancel-in-progress: true
    env:
      TF_VAR_gh_token: ${{ secrets.TF_VAR_GH_TOKEN }}
      TF_VAR_copilot_github_token: ${{ secrets.TF_VAR_COPILOT_GITHUB_TOKEN }}
      TF_VAR_exa_api_key: ${{ secrets.TF_VAR_EXA_API_KEY }}
      TF_VAR_perplexity_api_key: ${{ secrets.TF_VAR_PERPLEXITY_API_KEY }}
      TF_VAR_youtube_api_key: ${{ secrets.TF_VAR_YOUTUBE_API_KEY }}
      TF_VAR_zernio_api_key: ${{ secrets.TF_VAR_ZERNIO_API_KEY }}
      TF_VAR_slack_bot_token: ${{ secrets.TF_VAR_SLACK_BOT_TOKEN }}
      TF_VAR_slack_app_token: ${{ secrets.TF_VAR_SLACK_APP_TOKEN }}
      TF_VAR_git_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      TF_VAR_git_repo: https://github.com/${{ github.repository }}.git
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "project_name=gh-copilot-cli-telegram-bridge-dev" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "project_name=gh-copilot-cli-telegram-bridge" >> $GITHUB_OUTPUT
          else
            ENV="${{ inputs.environment || 'prod' }}"
            echo "env=$ENV" >> $GITHUB_OUTPUT
            if [ "$ENV" = "dev" ]; then
              echo "project_name=gh-copilot-cli-telegram-bridge-dev" >> $GITHUB_OUTPUT
            else
              echo "project_name=gh-copilot-cli-telegram-bridge" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set Telegram token for environment
        run: |
          if [ "${{ steps.env.outputs.env }}" = "dev" ]; then
            echo "TF_VAR_telegram_bot_token=${{ secrets.TF_VAR_TELEGRAM_BOT_TOKEN_DEV }}" >> $GITHUB_ENV
          else
            echo "TF_VAR_telegram_bot_token=${{ secrets.TF_VAR_TELEGRAM_BOT_TOKEN_PROD }}" >> $GITHUB_ENV
          fi
          echo "TF_VAR_environment=${{ steps.env.outputs.env }}" >> $GITHUB_ENV
          echo "TF_VAR_project_name=${{ steps.env.outputs.project_name }}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem
          chmod 600 $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem

      - name: Terraform Init
        working-directory: infra/aws
        run: terraform init

      - name: Download previous state
        uses: actions/download-artifact@v4
        with:
          name: terraform-state-${{ steps.env.outputs.env }}
          path: infra/aws/
        continue-on-error: true

      - name: Destroy existing ${{ steps.env.outputs.env }}
        working-directory: infra/aws
        run: terraform destroy -auto-approve 2>&1 || echo "No existing infrastructure"

      - name: Cleanup orphaned AWS resources
        run: |
          SG_NAME="${{ steps.env.outputs.project_name }}-${{ steps.env.outputs.env == 'dev' && 'dev' || 'prod' }}-sg"
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=${{ steps.env.outputs.project_name }}" \
                      "Name=instance-state-name,Values=running,pending,stopping" \
            --query "Reservations[].Instances[].InstanceId" --output text 2>/dev/null || true)
          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            echo "Terminating orphaned instances: $INSTANCE_IDS"
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS 2>/dev/null || true
            aws ec2 wait instance-terminated --instance-ids $INSTANCE_IDS 2>/dev/null || sleep 30
          fi
          SG_IDS=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${SG_NAME}" \
            --query "SecurityGroups[].GroupId" --output text 2>/dev/null || true)
          if [ -n "$SG_IDS" ] && [ "$SG_IDS" != "None" ]; then
            for SG in $SG_IDS; do
              echo "Deleting orphaned SG: $SG"
              aws ec2 delete-security-group --group-id "$SG" 2>/dev/null || true
            done
          fi
          echo "✅ Cleanup complete"

      - name: Terraform Apply (${{ steps.env.outputs.env }})
        if: steps.check.outputs.exists != 'true'
        working-directory: infra/aws
        run: |
          terraform apply -auto-approve
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV
          echo "INSTANCE_ID=$(terraform output -raw instance_id)" >> $GITHUB_ENV

      - name: Wait for bootstrap
        if: steps.check.outputs.exists != 'true'
        run: |
          echo "⏳ Waiting for bootstrap (${{ steps.env.outputs.env }})..."
          echo "   IP: ${{ env.PUBLIC_IP }}"

          for i in $(seq 1 30); do
            if ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=5 \
                ubuntu@${{ env.PUBLIC_IP }} "echo ready" 2>/dev/null; then
              echo "✅ SSH available"
              break
            fi
            echo "   Attempt $i/30 — waiting for SSH..."
            sleep 10
          done

          for i in $(seq 1 60); do
            STATUS=$(ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=10 \
                -o ServerAliveInterval=5 \
                -o ServerAliveCountMax=3 \
                ubuntu@${{ env.PUBLIC_IP }} \
                "cat ~/.deploy-status 2>/dev/null || echo STILL_RUNNING" 2>/dev/null || echo "SSH_FAILED")

            echo "   Check $i/60: $STATUS"

            if echo "$STATUS" | grep -q '"status":"success"'; then
              echo "✅ Bootstrap completed!"
              break
            fi

            if echo "$STATUS" | grep -q '"status":"failure"'; then
              echo "❌ Bootstrap failed!"
              ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
                  -o StrictHostKeyChecking=no \
                  ubuntu@${{ env.PUBLIC_IP }} \
                  "tail -30 /var/log/bootstrap.log" 2>/dev/null || true
              exit 1
            fi

            sleep 15
          done

      - name: Verify bridge service running
        run: |
          echo "=== Host SSH process ==="
          ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.PUBLIC_IP }} \
              'ps aux | grep "copilot-telegram-bridge" | grep -v grep | head -3'

          echo ""
          echo "=== Bridge service log (last 20 lines) ==="
          ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.PUBLIC_IP }} \
              'tail -20 ~/bridge-service.log 2>/dev/null || echo "No log file found"'

      - name: Verify Telegram polling
        run: |
          sleep 30
          TELEGRAM_COUNT=$(ssh -i $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ env.PUBLIC_IP }} \
              'export PATH=$HOME/.local/bin:$PATH && openshell logs $(cat ~/.sandbox-name) --since 3m 2>/dev/null | grep "api.telegram" | wc -l' 2>/dev/null || echo "0")

          echo "Telegram requests in last 3 min: $TELEGRAM_COUNT"
          [ "$TELEGRAM_COUNT" -gt "0" ] && echo "✅ Bridge service polling!" || echo "⚠️ Bridge may still be starting"

      - name: Deploy summary
        run: |
          echo ""
          echo "══════════════════════════════════════════════════════"
          echo "  ✅ ${{ steps.env.outputs.env }} DEPLOY COMPLETE"
          echo "  IP: ${{ env.PUBLIC_IP }}"
          echo "  SSH: ssh -i key.pem ubuntu@${{ env.PUBLIC_IP }}"
          echo "══════════════════════════════════════════════════════"

      - name: Save Terraform state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-${{ steps.env.outputs.env }}
          path: |
            infra/aws/terraform.tfstate
            infra/aws/terraform.tfstate.backup
          retention-days: 30

      - name: Cleanup SSH key
        if: always()
        run: rm -f $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem

  destroy:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-${{ inputs.environment || 'prod' }}
      cancel-in-progress: false
    env:
      TF_VAR_gh_token: ${{ secrets.TF_VAR_GH_TOKEN }}
      TF_VAR_copilot_github_token: ${{ secrets.TF_VAR_COPILOT_GITHUB_TOKEN }}
      TF_VAR_exa_api_key: ${{ secrets.TF_VAR_EXA_API_KEY }}
      TF_VAR_perplexity_api_key: ${{ secrets.TF_VAR_PERPLEXITY_API_KEY }}
      TF_VAR_youtube_api_key: ${{ secrets.TF_VAR_YOUTUBE_API_KEY }}
      TF_VAR_zernio_api_key: ${{ secrets.TF_VAR_ZERNIO_API_KEY }}
      TF_VAR_slack_bot_token: ${{ secrets.TF_VAR_SLACK_BOT_TOKEN }}
      TF_VAR_slack_app_token: ${{ secrets.TF_VAR_SLACK_APP_TOKEN }}
      TF_VAR_git_ref: ${{ github.sha }}
      TF_VAR_git_repo: https://github.com/${{ github.repository }}.git
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          ENV="${{ inputs.environment || 'prod' }}"
          echo "env=$ENV" >> $GITHUB_OUTPUT

      - name: Set Terraform variables
        run: |
          if [ "${{ steps.env.outputs.env }}" = "dev" ]; then
            echo "TF_VAR_telegram_bot_token=${{ secrets.TF_VAR_TELEGRAM_BOT_TOKEN_DEV }}" >> $GITHUB_ENV
            echo "TF_VAR_project_name=gh-copilot-cli-telegram-bridge-dev" >> $GITHUB_ENV
          else
            echo "TF_VAR_telegram_bot_token=${{ secrets.TF_VAR_TELEGRAM_BOT_TOKEN_PROD }}" >> $GITHUB_ENV
            echo "TF_VAR_project_name=gh-copilot-cli-telegram-bridge" >> $GITHUB_ENV
          fi
          echo "TF_VAR_environment=${{ steps.env.outputs.env }}" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem
          chmod 600 $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem

      - name: Download Terraform state
        uses: actions/download-artifact@v4
        with:
          name: terraform-state-${{ steps.env.outputs.env }}
          path: infra/aws/
        continue-on-error: true

      - name: Terraform Init
        working-directory: infra/aws
        run: terraform init

      - name: Terraform Destroy (${{ steps.env.outputs.env }})
        working-directory: infra/aws
        run: |
          terraform destroy -auto-approve
          echo "✅ ${{ steps.env.outputs.env }} infrastructure destroyed"

      - name: Cleanup SSH key
        if: always()
        run: rm -f $GITHUB_WORKSPACE/gh-copilot-openclaw-key.pem
